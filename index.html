function freshStore(){return {projects:[],tags:[],tasks:[],updatedAt:Date.now()};}
function migrate(raw){

  if(Array.isArray(raw.tasks)){
    raw.tags=Array.isArray(raw.tags)?raw.tags:[];

    raw.tags.forEach(t=>{if(!t.id)t.id='tag'+uid();if(!t.icon)t.icon='sine';if(!t.label)t.label='Tag';});
    raw.tasks.forEach(t=>{if(!t.id)t.id='t'+uid();if(typeof t.title!=='string')t.title=titleOf(t.text||'');if(typeof t.detail!=='string')t.detail='';if(!Array.isArray(t.tagIds))t.tagIds=[];if(typeof t.done!=='boolean')t.done=false;if(!t.ts)t.ts=Date.now();if(!t.date)t.date=fmtDate(t.ts);if(!t.icon)t.icon='sine';if(!Array.isArray(t.subs))t.subs=[];});
    return raw;
  }
  const tagsByLabel={}; const tags=[];
  function ensureTag(label){const k=slugify(label);if(tagsByLabel[k])return tagsByLabel[k].id;let ic=TAG_ICON_HINTS[k]||TAG_ICON_CYCLE[tags.length%TAG_ICON_CYCLE.length];const id='tag'+uid();const t={id,label,icon:ic};tags.push(t);tagsByLabel[k]=t;return id;}
  const projects=[], tasks=[];
  (raw.projects||[]).forEach((p,i)=>{
    const pid=p.id||('p'+uid());
    const tagIds=(Array.isArray(p.cats)?p.cats:(Array.isArray(p.tags)?p.tags:[])).map(ensureTag);

  scope.querySelectorAll('.otk-subdraft').forEach(el=>{const gr=()=>{el.style.height='auto';el.style.height=el.scrollHeight+'px';};el.addEventListener('input',()=>{subDraft[el.dataset.id]=el.value;gr();});el.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addSub(el.dataset.id,el.value);}});gr();});
  scope.querySelectorAll('.otk-tile').forEach(el=>{el.addEventListener('pointerdown',e=>{if(e.target.closest('.otk-nosw'))return;swStart(el.dataset.id,el,e);});});
  scope.querySelectorAll('[data-drag]').forEach(el=>{el.addEventListener('pointerdown',e=>{if(e.button!=null&&e.button>0)return;taskDragStart(el.dataset.drag,el,e);});});
  if(scope===document){
    const c=document.getElementById('otk-composer');if(c){c.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTask();}});c.addEventListener('input',()=>{c.style.height='auto';c.style.height=Math.min(c.scrollHeight,120)+'px';});if(!isMobile()&&!picker.open&&!promptS.open&&!syncOpen&&!settingsOpen)c.focus();}
    const s=document.getElementById('otk-search');if(s){s.addEventListener('input',()=>{view.search=s.value;refreshList();});if(view.searchOpen&&isMobile())s.focus();}
    const p=document.getElementById('otk-prompt');if(p){p.addEventListener('input',()=>{promptS.value=p.value;});p.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();promptOk();}if(e.key==='Escape')closePrompt();});setTimeout(()=>p.focus(),20);}
    const _is=document.getElementById('otk-iconsearch');if(_is){_is.addEventListener('input',()=>{picker.query=_is.value;const _g=document.getElementById('otk-icongrid');if(_g)_g.innerHTML=pickerGridHTML();});if(!isMobile())setTimeout(()=>_is.focus(),20);}
    const gl=document.getElementById('otk-glyph');if(gl){gl.addEventListener('input',()=>{const v=document.getElementById('otk-glyphval');if(v)v.textContent=parseFloat(gl.value).toFixed(2)+'×';});gl.addEventListener('change',()=>setSetting('glyphes',gl.value));}
    if(_focusSub){const si=document.querySelector('.otk-subdraft[data-id="'+_focusSub+'"]');_focusSub=null;if(si)si.focus();}
    if(view.titleEdit){const tt=document.querySelector('.otk-title[data-id="'+view.titleEdit+'"]');if(tt){tt.focus();const L=tt.value.length;try{tt.setSelectionRange(L,L);}catch(e){}}}
    const fi=document.getElementById('otk-file');if(fi)fi.addEventListener('change',()=>{lockerUpload(fi.files);fi.value='';});
    const dz=document.getElementById('otk-dz');if(dz){dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='var(--accent)';});dz.addEventListener('dragleave',()=>{dz.style.borderColor='';});dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';if(e.dataTransfer&&e.dataTransfer.files)lockerUpload(e.dataTransfer.files);});}
    const lks=document.getElementById('otk-lksearch');if(lks)lks.addEventListener('input',()=>{view.lkSearch=lks.value;refreshLkList();});
    wireLkAudio(document);
  }
}
document.getElementById('app').addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');if(!el)return;if(_suppressClick){_suppressClick=false;if(el.dataset.act==='toggleExpand')return;}const d=el.dataset,act=d.act;
  switch(act){
    case 'stop':return;
    case 'selectProject':selectProject(d.id);break;
    case 'selectTag':selectTag(d.id);break;
    case 'toggleTags':toggleTags();break;
    case 'toggleEditorTags':toggleEditorTags(d.id);break;
    case 'editTitle':view.titleEdit=(view.titleEdit===d.id?null:d.id);render();break;
    case 'toggleDone':toggleDone(d.id);break;
    case 'copyTask':copyTask(d.id,el);break;
    case 'togglePriority':togglePriority(d.id);break;
    case 'toggleExpand':toggleExpand(d.id);break;
    case 'deleteTask':deleteTask(d.id);break;
    case 'toggleSub':toggleSub(d.id,+d.i);break;
    case 'delSub':delSub(d.id,+d.i);break;
    case 'toggleTaskTag':toggleTaskTag(d.id,d.tid);break;
    case 'pickerFor':openPicker(d.kind,d.id);break;
    case 'pickIcon':pickIcon(d.key);break;
    case 'closePicker':closePicker();break;
    case 'addTask':addTask();break;
    case 'addProject':openPrompt('project');break;
    case 'addTag':openPrompt('tag');break;
    case 'promptOk':promptOk();break;
    case 'promptCancel':closePrompt();break;
    case 'openSync':openSync();break;
    case 'closeSync':closeSync();break;
    case 'syncConnect':syncConnect();break;
    case 'syncDisconnect':syncDisconnect();break;
    case 'openDrawer':view.drawer=true;render();break;
    case 'closeDrawer':view.drawer=false;render();break;
    case 'toggleSearch':toggleSearchM();break;
    case 'openSettings':settingsOpen=true;render();break;
    case 'closeSettings':settingsOpen=false;render();break;
    case 'setSetting':setSetting(d.key,d.val);break;
    case 'toggleDeskNav':view.deskNav=!view.deskNav;render();break;
    case 'setSection':setSection(d.s);break;
    case 'lkPick':{const fi=document.getElementById('otk-file');if(fi)fi.click();break;}
    case 'lkExpand':{const id=d.id;if(view.lkExpanded[id])delete view.lkExpanded[id];else{view.lkExpanded[id]=true;lockerEnsureMedia(id);}render();break;}
    case 'lkDownload':lockerDownload(d.id);break;
    case 'lkDelete':lockerDelete(d.id);break;
    case 'lkToggleTag':lockerToggleTag(d.id,d.tid);break;
    case 'lkAttachOpen':view.lkAttachOpen=(view.lkAttachOpen===d.id?null:d.id);render();break;
    case 'lkAttach':lockerAttach(d.id,d.tid);break;
    case 'lkUnlink':lockerUnlink(d.id);break;
    case 'lkFilterToggle':view.lkFilterOpen=!view.lkFilterOpen;render();break;
    case 'lkFilterClose':view.lkFilterOpen=false;render();break;
    case 'lkSetFilter':view.lkFilter=d.f;view.lkFilterOpen=false;render();break;
    case 'lkSetSort':view.lkSort=d.s;view.lkFilterOpen=false;render();break;
    case 'lkEnlarge':view.lkLightbox=d.id;lockerEnsureMedia(d.id);render();break;
    case 'lkLightboxClose':view.lkLightbox=null;render();break;
    case 'lkPlay':{const a=document.getElementById('otk-audio-'+d.id);if(a){if(a.paused){document.querySelectorAll('audio[data-lk]').forEach(o=>{if(o!==a)o.pause();});a.play().catch(()=>{});}else a.pause();}break;}
    case 'lkSeek':{const a=document.getElementById('otk-audio-'+d.id);if(a){const r=el.getBoundingClientRect();const frac=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));const dur=a.duration||(lkMedia[d.id]&&lkMedia[d.id].duration)||0;if(dur){a.currentTime=frac*dur;const c=document.getElementById('otk-wave-'+d.id);if(c)lkDrawWave(c,d.id);}}break;}
  }
});
document.getElementById('app').addEventListener('contextmenu',e=>{const el=e.target.closest('[data-act=selectProject]');if(el){e.preventDefault();deleteProject(el.dataset.id);}});

/* ============================ startup ============================ */
render();
if(cloudOn())cloudPull();
if(cloudOn()&&encOn())lockerPull().then(()=>{if(view.section==='locker')render();});
let _wasMobile=isMobile();
MOBILE_Q.addEventListener('change',()=>{_wasMobile=isMobile();render();});
window.addEventListener('resize',()=>{if(isMobile()!==_wasMobile){_wasMobile=isMobile();render();}});
function canAutoPull(){if(!cloudOn()||pushTimer||!navigator.onLine)return false;if(picker.open||promptS.open||syncOpen||settingsOpen)return false;const a=document.activeElement,t=a&&a.tagName;if(t==='TEXTAREA')return false;if(t==='INPUT'&&(a.value||'').trim())return false;return true;}
setInterval(()=>{if(canAutoPull())cloudPull();},45000);
setInterval(()=>{if(view.section==='locker'&&lockerReady()&&!Object.keys(lkUploads).length&&!view.lkLightbox){const b=lockerIndex.map(i=>i.id).join(',');lockerPull().then(()=>{if(lockerIndex.map(i=>i.id).join(',')!==b)render();lockerPrefetch();});}},5000);
window.addEventListener('online',()=>{if(cloudOn())cloudPull();});
})();
</script>
