/* ============================ constants ============================ */

const GLYPHS={
  sine:[['path',{d:'M3 12 Q7 3.5 11 12 T19 12'}]],
  square:[['path',{d:'M3 15 H6 V9 H12 V15 H18 V9 H21'}]],

  reverb:[['path',{d:'M4 7 V17'}],['path',{d:'M8 8 Q11 12 8 16'}],['path',{d:'M12 6 Q17 12 12 18'}],['path',{d:'M16 5 Q22 12 16 19'}]],
  samphold:[['path',{d:'M3 15 H7 V9 H11 V13 H15 V7 H19 V12 H21'}]],

function svgAttrs(o){return Object.keys(o).map(k=>k+'="'+o[k]+'"').join(' ');}
function icon(key,size){const shapes=GLYPHS[key]||GLYPHS.sine;const inner=shapes.map(sp=>'<'+sp[0]+' '+svgAttrs(sp[1])+'/>').join('');return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block;flex:none">'+inner+'</svg>';}
function iconLabel(k){const f=ICON_KEYS.find(x=>x.key===k);return f?f.label:k;}

const PROJ_ICON_CYCLE=['matrix','sine','scope','filter','env','lfo','delay','reverb','wavetable','patch'];

const TAG_ICON_CYCLE=['sine','square','triangle','env','filter','scope','patch','gain','clock','samphold'];

/* ============================ helpers ============================ */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function titleOf(text){const l=(text||'').split('\n').map(s=>s.trim()).filter(Boolean);return l[0]||'(untitled)';}
function fmtDate(ts){try{return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}catch(e){return '';}}
function slugify(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'').slice(0,24)||'t';}

/* ============================ settings ============================ */

function saveSettings(){localStorage.setItem(SET_KEY,JSON.stringify(settings));}
let settings=loadSettings();

fixActive();
try{localStorage.setItem(KEY,JSON.stringify(store));}catch(e){}

/* ============================ migration ============================ */
function freshStore(){return {projects:[],tags:[],tasks:[],updatedAt:Date.now()};}
function migrate(raw){
  if(!raw||typeof raw!=='object'||!Array.isArray(raw.projects))return freshStore();
  if(Array.isArray(raw.tasks)){
    raw.tags=Array.isArray(raw.tags)?raw.tags:[];

const CFG_TOKEN="tasks.gist.token",CFG_ID="tasks.gist.id",GFILE="tasks.json";

function ghHeaders(json){const h={Authorization:"token "+cloud.token,Accept:"application/vnd.github+json"};if(json)h["Content-Type"]="application/json";return h;}
const ENC_PASS="tasks.enc.pass",ENC_SALT="tasks.enc.salt";

async function cloudPull(){
  if(!cloudOn())return false;setCloud('syncing');
  try{const r=await fetch("https://api.github.com/gists/"+cloud.id,{headers:ghHeaders()});if(!r.ok)throw new Error("HTTP "+r.status);
    const g=await r.json();const f=g.files&&g.files[GFILE];
    if(f){let content=f.content;if(f.truncated&&f.raw_url)content=await(await fetch(f.raw_url)).text();
      const parsed=JSON.parse(content);let data;
      if(parsed&&parsed.enc){if(!encOn()){cloud.err="This gist is encrypted — enter the passphrase.";setCloud('error');return false;}lastPullEncrypted=true;data=await decPayload(parsed);}

  }catch(e){cloud.err=e.name==="OperationError"?"Wrong passphrase.":"";setCloud(navigator.onLine?'error':'offline');return false;}
}
async function cloudPush(){
  if(!cloudOn())return false;setCloud('syncing');
  try{const content=encOn()?await encPayload():JSON.stringify(store,null,2);const body={files:{}};body.files[GFILE]={content};
    const r=await fetch("https://api.github.com/gists/"+cloud.id,{method:"PATCH",headers:ghHeaders(true),body:JSON.stringify(body)});if(!r.ok)throw new Error("HTTP "+r.status);setCloud('synced');return true;
  }catch(e){setCloud(navigator.onLine?'error':'offline');return false;}
}

async function syncConnect(){
  const tok=(document.getElementById('otk-token')||{}).value||"";const gid=((document.getElementById('otk-gist')||{}).value||"").trim();const pass=(document.getElementById('otk-pass')||{}).value||"";const st=document.getElementById('otk-syncstatus');

  cloud.token=tok.trim();localStorage.setItem(CFG_TOKEN,cloud.token);
  if(pass)localStorage.setItem(ENC_PASS,pass);else localStorage.removeItem(ENC_PASS);
  cryptoKey=null;cloud.err="";
  try{
    if(gid){cloud.id=gid;localStorage.setItem(CFG_ID,gid);if(st)st.textContent="Connecting…";const ok=await cloudPull();
      if(!ok){if(st){st.textContent=cloud.err||"Failed — check token / ID.";st.style.color="#e0705a";}return;}

}

  const body='<div id="otk-list" style="flex:1;min-height:0;overflow-y:auto;padding:4px 0 calc(20px + env(safe-area-inset-bottom));">'+tileListHTML()+'</div>';
  let overlays='';
  if(view.drawer){let pr='';store.projects.forEach(p=>{const active=p&&proj&&p.id===proj.id;const cnt=store.tasks.filter(t=>t.projectId===p.id&&!t.done).length;pr+='<div data-act="selectProject" data-id="'+p.id+'" style="display:flex;align-items:center;gap:9px;padding:11px 8px;border-radius:0;cursor:pointer;margin-bottom:2px;'+(active?'background:var(--accent-dim);box-shadow:inset 2px 0 0 var(--accent);':'')+'"><span data-act="pickerFor" data-kind="project" data-id="'+p.id+'" style="display:flex;flex:none;padding:2px;cursor:pointer;color:'+(active?'var(--accent)':'var(--dim2)')+';">'+icon(p.icon,Math.round(15*Math.min(g,1.3)))+'</span><div style="display:flex;flex-direction:column;min-width:0;flex:1;gap:1px;"><span style="font-size:8.5px;letter-spacing:.12em;color:var(--faint);">'+esc(p.code)+'</span><span style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;'+(active?'font-weight:600;color:var(--text);':'color:var(--dim);')+'">'+esc(p.name)+'</span></div><span style="font-size:10px;flex:none;color:'+(active?'var(--accent)':'var(--faint)')+';">'+cnt+'</span></div>';});
    overlays+='<div data-act="closeDrawer" style="position:absolute;inset:0;z-index:30;background:rgba(0,0,0,.55);"></div>'
      +'<aside style="position:absolute;top:0;left:0;bottom:0;z-index:31;width:80%;max-width:300px;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.5);"><div style="height:max(8px,env(safe-area-inset-top));flex:none;"></div>'
      +'<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;"><span style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);">Projects</span><button data-act="addProject" style="display:flex;align-items:center;justify-content:center;width:30px;height:30px;border:1px solid var(--line);border-radius:0;background:transparent;color:var(--dim);cursor:pointer;">'+icon('plus',15)+'</button></div>'
      +'<div style="flex:1;overflow-y:auto;padding:2px 10px;">'+(pr||'<div style="padding:12px;color:var(--faint);font-size:11px;">No projects.</div>')+'</div>'
      +'<button data-act="openSettings" style="display:flex;align-items:center;gap:9px;padding:13px 16px;border:none;border-top:1px solid var(--line-soft);background:transparent;color:var(--dim);cursor:pointer;font-family:inherit;"><span style="display:flex;">'+icon('sliders',16)+'</span><span style="font-size:11px;letter-spacing:.04em;">Settings</span></button>'
      +'<button data-act="openSync" style="display:flex;align-items:center;gap:9px;padding:13px 16px;border:none;border-top:1px solid var(--line-soft);background:transparent;cursor:pointer;"><span class="otk-syncdot" style="width:6px;height:6px;border-radius:50%;flex:none;"></span><span style="font-size:11px;letter-spacing:.04em;color:var(--dim);">Sync — GitHub Gist</span></button>'
      +'<div style="padding:0 16px calc(20px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:7px;"><span class="otk-syncdot" style="width:6px;height:6px;border-radius:50%;flex:none;"></span><span style="font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);">Local · offline</span></div></aside>';
  }
  return '<div style="position:relative;display:flex;flex-direction:column;height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);">'+spacer+header+searchRow+filterRow+composer+body+overlays+'</div>';
}

/* ============================ modals ============================ */
function modalsHTML(){
  let h='';
  if(picker.open){const tgt=currentTargetIcon();let grid='';ICON_KEYS.forEach(k=>{const active=k.key===tgt;grid+='<button data-act="pickIcon" data-key="'+k.key+'" title="'+esc(k.label)+'" style="display:flex;align-items:center;justify-content:center;height:46px;border-radius:var(--r2);cursor:pointer;font-family:inherit;color:'+(active?'var(--accent)':'var(--text2)')+';background:'+(active?'var(--accent-soft)':'var(--bg)')+';border:1px solid '+(active?'var(--accent-line)':'var(--line)')+';">'+icon(k.key,22)+'</button>';});
    h+='<div data-act="closePicker" style="position:fixed;inset:0;z-index:60;background:rgba(6,5,4,.74);display:flex;align-items:center;justify-content:center;padding:24px;"><div data-act="stop" style="width:430px;max-width:100%;background:var(--surface2);border:1px solid var(--line-strong);border-radius:var(--r1);padding:17px;box-shadow:0 28px 80px rgba(0,0,0,.6);"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;"><span style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);">Choose an icon</span><button data-act="closePicker" title="Close" style="display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:none;border-radius:var(--r3);background:transparent;color:var(--dim2);cursor:pointer;">'+icon('x',16)+'</button></div><p style="margin:0 0 13px;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);">→ '+esc(targetLabel())+'</p><div style="display:grid;grid-template-columns:repeat(6,1fr);gap:7px;">'+grid+'</div></div></div>';
  }
  if(promptS.open){h+='<div data-act="promptCancel" style="position:fixed;inset:0;z-index:60;background:rgba(6,5,4,.74);display:flex;align-items:center;justify-content:center;padding:24px;"><div data-act="stop" style="width:360px;max-width:100%;background:var(--surface2);border:1px solid var(--line-strong);border-radius:var(--r1);padding:17px;box-shadow:0 28px 80px rgba(0,0,0,.6);"><span style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);">'+(promptS.kind==='project'?'New project':'New tag')+'</span><input id="otk-prompt" value="'+esc(promptS.value)+'" placeholder="Name…" style="width:100%;margin:13px 0;background:var(--bg);border:1px solid var(--line);border-radius:var(--r2);padding:9px 11px;font-family:inherit;font-size:13px;color:var(--text);outline:none;" /><div style="display:flex;justify-content:flex-end;gap:8px;"><button data-act="promptCancel" style="padding:8px 14px;border:1px solid var(--line-strong);border-radius:var(--r2);background:transparent;color:var(--dim);font-family:inherit;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;">Cancel</button><button data-act="promptOk" style="padding:8px 16px;border:none;border-radius:var(--r2);background:var(--accent);color:var(--bg);font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;">OK</button></div></div></div>';}
  if(syncOpen){const connected=cloudOn();h+='<div data-act="closeSync" style="position:fixed;inset:0;z-index:60;background:rgba(6,5,4,.74);display:flex;align-items:center;justify-content:center;padding:24px;"><div data-act="stop" style="width:450px;max-width:100%;background:var(--surface2);border:1px solid var(--line-strong);border-radius:var(--r1);padding:18px;box-shadow:0 28px 80px rgba(0,0,0,.6);"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><span style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);">Sync — GitHub Gist</span><button data-act="closeSync" title="Close" style="display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:none;border-radius:var(--r3);background:transparent;color:var(--dim2);cursor:pointer;">'+icon('x',16)+'</button></div>'
    +'<p style="margin:0 0 14px;font-size:11px;line-height:1.6;color:var(--dim2);">Classic token, <span style="color:var(--dim);">gist</span> scope. Stored on this device only. Empty Gist ID = create.</p>'
    +'<label style="display:block;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;">Token</label><input id="otk-token" type="password" value="'+esc(cloud.token)+'" placeholder="ghp_…" style="width:100%;margin-bottom:12px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r2);padding:9px 11px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;" />'
    +'<label style="display:block;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;">Gist ID (empty = create)</label><input id="otk-gist" value="'+esc(cloud.id)+'" placeholder="—" style="width:100%;margin-bottom:12px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r2);padding:9px 11px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;" />'
    +'<label style="display:block;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;">Passphrase (vault — empty = unencrypted)</label><input id="otk-pass" type="password" value="'+esc(encPass())+'" placeholder="end-to-end encryption" style="width:100%;margin-bottom:6px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r2);padding:9px 11px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;" />'
    +'<p style="margin:0 0 13px;font-size:10px;line-height:1.6;color:var(--faint);">If set, your notes are encrypted (AES-256) before upload. Same passphrase on every device. Lost = unrecoverable.</p>'
    +'<div id="otk-syncstatus" style="font-size:10.5px;letter-spacing:.04em;color:var(--dim2);margin-bottom:12px;min-height:14px;">'+(cloud.err?esc(cloud.err):(connected?'Connected · Gist '+esc(cloud.id.slice(0,10))+(encOn()?' · encrypted':''):'Not connected'))+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px;"><span style="flex:1"></span>'+(connected?'<button data-act="syncDisconnect" style="padding:8px 13px;border:1px solid var(--line-strong);border-radius:var(--r2);background:transparent;color:var(--dim);font-family:inherit;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;">Disconnect</button>':'')+'<button data-act="syncConnect" style="padding:8px 16px;border:none;border-radius:var(--r2);background:var(--accent);color:var(--bg);font-family:inherit;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;">'+(connected?'Reconnect':'Connect')+'</button></div></div></div>';}
  if(settingsOpen)h+=settingsHTML();
  return h;
}
function segRow(label,key,opts){let b='';opts.forEach(o=>{const active=settings[key]===o;b+='<button data-act="setSetting" data-key="'+key+'" data-val="'+esc(o)+'" style="padding:6px 11px;border-radius:var(--r3);border:1px solid '+(active?'var(--accent-line)':'var(--line)')+';background:'+(active?'var(--accent-soft)':'var(--bg)')+';color:'+(active?'var(--accent)':'var(--dim)')+';font-family:inherit;font-size:11px;cursor:pointer;">'+esc(o)+'</button>';});return '<div style="margin-bottom:14px;"><div style="font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:7px;">'+label+'</div><div style="display:flex;flex-wrap:wrap;gap:6px;">'+b+'</div></div>';}
function swatchRow(label,key,map,mode){let b='';Object.keys(map).forEach(name=>{const active=settings[key]===name;const col=mode==='accent'?map[name].a:map[name].bg;b+='<button data-act="setSetting" data-key="'+key+'" data-val="'+esc(name)+'" title="'+esc(name)+'" style="display:flex;align-items:center;gap:7px;padding:5px 9px 5px 6px;border-radius:var(--r3);border:1px solid '+(active?'var(--accent-line)':'var(--line)')+';background:'+(active?'var(--accent-soft)':'var(--bg)')+';color:'+(active?'var(--accent)':'var(--dim)')+';font-family:inherit;font-size:10.5px;cursor:pointer;"><span style="width:14px;height:14px;border-radius:4px;flex:none;background:'+col+';border:1px solid rgba(255,255,255,.12);"></span>'+esc(name)+'</button>';});return '<div style="margin-bottom:14px;"><div style="font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:7px;">'+label+'</div><div style="display:flex;flex-wrap:wrap;gap:6px;">'+b+'</div></div>';}
function settingsHTML(){
  return '<div data-act="closeSettings" style="position:fixed;inset:0;z-index:60;background:rgba(6,5,4,.74);display:flex;align-items:center;justify-content:center;padding:24px;"><div data-act="stop" style="width:520px;max-width:100%;max-height:88vh;overflow-y:auto;background:var(--surface2);border:1px solid var(--line-strong);border-radius:var(--r1);padding:18px;box-shadow:0 28px 80px rgba(0,0,0,.6);">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;"><span style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);">Settings</span><button data-act="closeSettings" title="Close" style="display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:none;border-radius:var(--r3);background:transparent;color:var(--dim2);cursor:pointer;">'+icon('x',16)+'</button></div>'
    +swatchRow('Background','fond',BASES,'bg')+swatchRow('Accent','accent',ACCENTS,'accent')
    +segRow('Font','police',Object.keys(FONTS))+segRow('Corners','coins',['Rounded','Square'])+segRow('Titles','titres',['Normal','Uppercase'])+segRow('Search (desktop)','recherche',['Right','Centered'])+segRow('Layout (desktop)','disposition',['Rows','Cards'])
    +'<div style="margin-bottom:4px;"><div style="font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:7px;">Glyph size · <span id="otk-glyphval" style="color:var(--dim)">'+G().toFixed(2)+'×</span></div><input id="otk-glyph" type="range" min="1" max="1.6" step="0.05" value="'+G()+'" style="width:100%;accent-color:var(--accent);" /></div></div></div>';
}

/* ============================ render + wiring ============================ */
const MOBILE_Q=window.matchMedia('(max-width:640px)');
function isMobile(){return MOBILE_Q.matches;}
function render(){applyTheme();document.getElementById('app').innerHTML=(isMobile()?renderMobile():renderDesktop())+modalsHTML();attachInputs(document);refreshSyncDot();}
function refreshList(){const el=document.getElementById('otk-list');if(!el)return;el.innerHTML=isMobile()?tileListHTML():listInnerHTML();attachInputs(el);}
function attachInputs(scope){
  scope.querySelectorAll('.otk-title').forEach(el=>{el.addEventListener('input',()=>setTitle(el.dataset.id,el.value));});
  scope.querySelectorAll('.otk-detail').forEach(el=>{el.addEventListener('input',()=>setDetail(el.dataset.id,el.value));});
  scope.querySelectorAll('.otk-subdraft').forEach(el=>{el.addEventListener('input',()=>{subDraft[el.dataset.id]=el.value;});el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addSub(el.dataset.id,el.value);}});});
  scope.querySelectorAll('.otk-tile').forEach(el=>{el.addEventListener('pointerdown',e=>{if(e.target.closest('.otk-nosw'))return;swStart(el.dataset.id,el,e);});});
  if(scope===document){
    const c=document.getElementById('otk-composer');if(c){c.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTask();}});c.addEventListener('input',()=>{c.style.height='auto';c.style.height=Math.min(c.scrollHeight,120)+'px';});if(!isMobile()&&!picker.open&&!promptS.open&&!syncOpen&&!settingsOpen)c.focus();}
    const s=document.getElementById('otk-search');if(s){s.addEventListener('input',()=>{view.search=s.value;refreshList();});if(view.searchOpen&&isMobile())s.focus();}
    const p=document.getElementById('otk-prompt');if(p){p.addEventListener('input',()=>{promptS.value=p.value;});p.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();promptOk();}if(e.key==='Escape')closePrompt();});setTimeout(()=>p.focus(),20);}
    const gl=document.getElementById('otk-glyph');if(gl){gl.addEventListener('input',()=>{const v=document.getElementById('otk-glyphval');if(v)v.textContent=parseFloat(gl.value).toFixed(2)+'×';});gl.addEventListener('change',()=>setSetting('glyphes',gl.value));}
  }
}
document.getElementById('app').addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');if(!el)return;if(_suppressClick){_suppressClick=false;if(el.dataset.act==='toggleExpand')return;}const d=el.dataset,act=d.act;
  switch(act){
    case 'stop':return;
    case 'selectProject':selectProject(d.id);break;
    case 'selectTag':selectTag(d.id);break;
    case 'toggleTags':toggleTags();break;
    case 'toggleEditorTags':toggleEditorTags(d.id);break;
    case 'toggleDone':toggleDone(d.id);break;
    case 'toggleExpand':toggleExpand(d.id);break;
    case 'deleteTask':deleteTask(d.id);break;
    case 'toggleSub':toggleSub(d.id,+d.i);break;
    case 'toggleTaskTag':toggleTaskTag(d.id,d.tid);break;
    case 'pickerFor':openPicker(d.kind,d.id);break;
    case 'pickIcon':pickIcon(d.key);break;
    case 'closePicker':closePicker();break;
    case 'addTask':addTask();break;
    case 'addProject':openPrompt('project');break;
    case 'addTag':openPrompt('tag');break;
    case 'promptOk':promptOk();break;
    case 'promptCancel':closePrompt();break;
    case 'openSync':openSync();break;
    case 'closeSync':closeSync();break;
    case 'syncConnect':syncConnect();break;
    case 'syncDisconnect':syncDisconnect();break;
    case 'openDrawer':view.drawer=true;render();break;
    case 'closeDrawer':view.drawer=false;render();break;
    case 'toggleSearch':toggleSearchM();break;
    case 'openSettings':settingsOpen=true;render();break;
    case 'closeSettings':settingsOpen=false;render();break;
    case 'setSetting':setSetting(d.key,d.val);break;
    case 'toggleDeskNav':view.deskNav=!view.deskNav;render();break;
  }
});
document.getElementById('app').addEventListener('contextmenu',e=>{const el=e.target.closest('[data-act=selectProject]');if(el){e.preventDefault();deleteProject(el.dataset.id);}});

/* ============================ startup ============================ */
render();
if(cloudOn())cloudPull();
let _wasMobile=isMobile();
MOBILE_Q.addEventListener('change',()=>{_wasMobile=isMobile();render();});
window.addEventListener('resize',()=>{if(isMobile()!==_wasMobile){_wasMobile=isMobile();render();}});
function canAutoPull(){if(!cloudOn()||pushTimer||!navigator.onLine)return false;if(picker.open||promptS.open||syncOpen||settingsOpen)return false;const a=document.activeElement,t=a&&a.tagName;if(t==='TEXTAREA')return false;if(t==='INPUT'&&(a.value||'').trim())return false;return true;}
setInterval(()=>{if(canAutoPull())cloudPull();},45000);
window.addEventListener('online',()=>{if(cloudOn())cloudPull();});
})();
</script>
</body>
</html>
