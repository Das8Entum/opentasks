function svgAttrs(o){return Object.keys(o).map(k=>k+'="'+o[k]+'"').join(' ');}
function icon(key,size){const shapes=GLYPHS[key]||GLYPHS.sine;const inner=shapes.map(sp=>'<'+sp[0]+' '+svgAttrs(sp[1])+'/>').join('');return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:block;flex:none">'+inner+'</svg>';}
function iconLabel(k){const f=ICON_KEYS.find(x=>x.key===k);return f?f.label:k;}

const PROJ_ICON_CYCLE=['matrix','sine','scope','filter','env','lfo','delay','reverb','wavetable','patch'];

const TAG_ICON_CYCLE=['sine','square','triangle','env','filter','scope','patch','gain','clock','samphold'];

/* ============================ helpers ============================ */
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function titleOf(text){const l=(text||'').split('\n').map(s=>s.trim()).filter(Boolean);return l[0]||'(untitled)';}
function fmtDate(ts){try{return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});}catch(e){return '';}}
function slugify(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'').slice(0,24)||'t';}

/* ============================ migration ============================ */
function freshStore(){return {projects:[],tags:[],tasks:[],updatedAt:Date.now()};}
function migrate(raw){
  if(!raw||typeof raw!=='object'||!Array.isArray(raw.projects))return freshStore();
  if(Array.isArray(raw.tasks)){
    raw.tags=Array.isArray(raw.tags)?raw.tags:[];
    raw.projects.forEach((p,i)=>{if(!p.id)p.id='p'+uid();if(!p.code)p.code='P'+String(i+1).padStart(2,'0');if(!p.icon)p.icon=PROJ_ICON_CYCLE[i%PROJ_ICON_CYCLE.length];if(!Array.isArray(p.tagIds))p.tagIds=[];});
    raw.tags.forEach(t=>{if(!t.id)t.id='tag'+uid();if(!t.icon)t.icon='sine';if(!t.label)t.label='Tag';});
    raw.tasks.forEach(t=>{if(!t.id)t.id='t'+uid();if(typeof t.title!=='string')t.title=titleOf(t.text||'');if(typeof t.detail!=='string')t.detail='';if(!Array.isArray(t.tagIds))t.tagIds=[];if(typeof t.done!=='boolean')t.done=false;if(!t.ts)t.ts=Date.now();if(!t.date)t.date=fmtDate(t.ts);if(!t.icon)t.icon='sine';if(!Array.isArray(t.subs))t.subs=[];});
    return raw;
  }
  const tagsByLabel={}; const tags=[];
  function ensureTag(label){const k=slugify(label);if(tagsByLabel[k])return tagsByLabel[k].id;let ic=TAG_ICON_HINTS[k]||TAG_ICON_CYCLE[tags.length%TAG_ICON_CYCLE.length];const id='tag'+uid();const t={id,label,icon:ic};tags.push(t);tagsByLabel[k]=t;return id;}
  const projects=[], tasks=[];
  (raw.projects||[]).forEach((p,i)=>{
    const pid=p.id||('p'+uid());
    const tagIds=(Array.isArray(p.cats)?p.cats:(Array.isArray(p.tags)?p.tags:[])).map(ensureTag);
    projects.push({id:pid,code:'P'+String(i+1).padStart(2,'0'),name:p.name||'Untitled',icon:PROJ_ICON_CYCLE[i%PROJ_ICON_CYCLE.length],tagIds});
    (p.ideas||[]).forEach(idea=>{
      const its=(idea.tags?idea.tags:(idea.cat?[idea.cat]:[])).map(ensureTag);
      const ts=idea.ts||Date.now();const txt=idea.text||'';const lines=txt.split('\n');
      tasks.push({id:idea.id||('t'+uid()),projectId:pid,icon:(its.length?tags.find(x=>x.id===its[0]).icon:'sine'),title:titleOf(txt),detail:lines.slice(1).join('\n').trim(),tagIds:its,done:!!idea.done,ts,date:fmtDate(ts),subs:[]});
    });
  });
  return {projects,tags,tasks,updatedAt:Date.now()};
}
function load(){try{const r=localStorage.getItem(KEY);if(r)return migrate(JSON.parse(r));}catch(e){}return freshStore();}
function persistLocal(){localStorage.setItem(KEY,JSON.stringify(store));}
function save(){store.updatedAt=Date.now();persistLocal();schedulePush();}
function fixActive(){if(!store.projects.find(p=>p.id===view.projectId))view.projectId=store.projects[0]?store.projects[0].id:null;}

/* ============================ cloud sync (GitHub Gist) ============================ */
const CFG_TOKEN="tasks.gist.token",CFG_ID="tasks.gist.id",GFILE="tasks.json";
const cloud={token:localStorage.getItem(CFG_TOKEN)||"",id:localStorage.getItem(CFG_ID)||"",err:""};
let pushTimer=null;
const cloudOn=()=>!!(cloud.token&&cloud.id);
let cloudState='off';
function ghHeaders(json){const h={Authorization:"token "+cloud.token,Accept:"application/vnd.github+json"};if(json)h["Content-Type"]="application/json";return h;}
const ENC_PASS="tasks.enc.pass",ENC_SALT="tasks.enc.salt";
let cryptoKey=null,encSalt=localStorage.getItem(ENC_SALT)||"",lastPullEncrypted=false;
const encPass=()=>localStorage.getItem(ENC_PASS)||"";
const encOn=()=>!!encPass();
function b64e(buf){const b=new Uint8Array(buf);let s="";const CH=0x8000;for(let i=0;i<b.length;i+=CH)s+=String.fromCharCode.apply(null,b.subarray(i,i+CH));return btoa(s);}
function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function deriveKey(salt){const base=await crypto.subtle.importKey("raw",new TextEncoder().encode(encPass()),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:200000,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);}
async function getKey(saltB64){let sB=saltB64||encSalt;if(!sB)sB=b64e(crypto.getRandomValues(new Uint8Array(16)));if(cryptoKey&&sB===encSalt)return cryptoKey;encSalt=sB;localStorage.setItem(ENC_SALT,encSalt);cryptoKey=await deriveKey(b64d(encSalt));return cryptoKey;}
async function encPayload(){const key=await getKey();const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(JSON.stringify(store)));return JSON.stringify({enc:"v1",salt:encSalt,iv:b64e(iv),ct:b64e(ct)});}
async function decPayload(env){const key=await getKey(env.salt);const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(env.iv)},key,b64d(env.ct));return JSON.parse(new TextDecoder().decode(pt));}
function setCloud(s){cloudState=s;refreshSyncDot();}
function refreshSyncDot(){

async function cloudPull(){

  try{const r=await fetch("https://api.github.com/gists/"+cloud.id,{headers:ghHeaders()});if(!r.ok)throw new Error("HTTP "+r.status);
    const g=await r.json();const f=g.files&&g.files[GFILE];
    if(f){let content=f.content;if(f.truncated&&f.raw_url)content=await(await fetch(f.raw_url)).text();
      const parsed=JSON.parse(content);let data;
      if(parsed&&parsed.enc){if(!encOn()){cloud.err="This gist is encrypted — enter the passphrase.";setCloud('error');return false;}lastPullEncrypted=true;data=await decPayload(parsed);}
      else{lastPullEncrypted=false;data=parsed;}

}

    const r=await fetch("https://api.github.com/gists/"+cloud.id,{method:"PATCH",headers:ghHeaders(true),body:JSON.stringify(body)});if(!r.ok)throw new Error("HTTP "+r.status);setCloud('synced');return true;

}

async function encJSON(obj){const key=await getKey();const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(JSON.stringify(obj)));return JSON.stringify({enc:"v1",salt:encSalt,iv:b64e(iv),ct:b64e(ct)});}

async function lkDelObj(k){try{await fetch(lkBase()+"/o/"+encodeURIComponent(k),{method:"DELETE",headers:lkAuth()});}catch(e){}}
async function lockerPull(){
  if(!cloudOn()||!encOn())return;
  try{const r=await fetch("https://api.github.com/gists/"+cloud.id,{headers:ghHeaders()});if(!r.ok)throw new Error("HTTP "+r.status);
    const g=await r.json();const f=g.files&&g.files["locker.json"];
    if(f){let c=f.content;if(f.truncated&&f.raw_url)c=await(await fetch(f.raw_url)).text();const p=JSON.parse(c);const data=(p&&p.enc)?await decJSON(p):p;lockerIndex=Array.isArray(data&&data.items)?data.items:[];}

}
async function lockerPush(){if(!cloudOn()||!encOn())return;const content=await encJSON({items:lockerIndex});const body={files:{}};body.files["locker.json"]={content};const r=await fetch("https://api.github.com/gists/"+cloud.id,{method:"PATCH",headers:ghHeaders(true),body:JSON.stringify(body)});if(!r.ok)throw new Error("index push "+r.status);}
function guessType(name){const e=(name.split(".").pop()||"").toLowerCase();const m={jpg:"image/jpeg",jpeg:"image/jpeg",png:"image/png",gif:"image/gif",webp:"image/webp",svg:"image/svg+xml",avif:"image/avif",bmp:"image/bmp",mp3:"audio/mpeg",wav:"audio/wav",ogg:"audio/ogg",oga:"audio/ogg",m4a:"audio/mp4",aac:"audio/aac",flac:"audio/flac",mp4:"video/mp4",webm:"video/webm",mov:"video/quicktime",mkv:"video/x-matroska",pdf:"application/pdf",txt:"text/plain",md:"text/markdown",csv:"text/csv",log:"text/plain",json:"application/json"};return m[e]||"";}
function mediaKind(t,name){t=t||guessType(name);const e=((name||'').split('.').pop()||'').toLowerCase();if(t.startsWith("image/"))return "image";if(t.startsWith("audio/"))return "audio";if(t.startsWith("video/"))return "video";if(t==="application/pdf"||e==="pdf")return "pdf";if(t.startsWith("text/")||t==="application/json"||["txt","md","markdown","csv","log","json","js","ts","tsx","jsx","cpp","h","hpp","cc","c","rs","py","go","css","html","xml","yaml","yml","java","gen","genexpr","maxpat"].includes(e))return "text";return "file";}
function kindIcon(k){return {image:"scope",audio:"sine",video:"triangle",pdf:"square",text:"clock",file:"patch"}[k]||"patch";}
function fmtSize(b){if(b<1024)return b+" B";if(b<1048576)return (b/1024).toFixed(0)+" KB";if(b<1073741824)return (b/1048576).toFixed(1)+" MB";return (b/1073741824).toFixed(2)+" GB";}
async function lockerUpload(fileList){
  const files=[...fileList];if(!files.length)return;
  if(!lockerReady()){lkErr="Locker needs Sync connected + a passphrase + a Worker URL/token.";render();return;}
  for(const file of files){
    const id="f"+uid();const total=Math.max(1,Math.ceil(file.size/LK_CHUNK));
    lkUploads[id]={name:file.name,done:0,total,err:""};render();
    try{
      for(let i=0;i<total;i++){const buf=await file.slice(i*LK_CHUNK,(i+1)*LK_CHUNK).arrayBuffer();await lkPut(id+"/"+i, await encBytes(buf));lkUploads[id].done=i+1;lkProg();}
      lockerIndex.unshift({id,name:file.name,type:file.type||guessType(file.name),size:file.size,chunks:total,ts:Date.now()});

  }

async function lockerBlob(item){const parts=[];for(let i=0;i<item.chunks;i++)parts.push(await decBytes(await lkGet(item.id+"/"+i)));return new Blob(parts,{type:item.type||"application/octet-stream"});}

function fmtDur(s){s=Math.max(0,Math.round(s||0));const m=(s/60)|0;return m+':'+String(s%60).padStart(2,'0');}

async function lockerEnsureMedia(id){
  if(lkMedia[id]&&(lkMedia[id].ready||lkMedia[id].loading))return;

  cryptoKey=null;cloud.err="";

      if(!ok){if(st){st.textContent=cloud.err||"Failed — check token / ID.";st.style.color="#e0705a";}return;}

/* ============================ derive ============================ */
function currentProject(){return store.projects.find(p=>p.id===view.projectId)||store.projects[0]||null;}
function tagMap(){const m={};store.tags.forEach(t=>m[t.id]=t);return m;}
function filteredTasks(proj){
  let list=store.tasks.filter(t=>t.projectId===proj.id);
  if(view.tags.length)list=list.filter(t=>view.tags.every(tg=>t.tagIds.includes(tg)));
  const q=(view.search||'').trim().toLowerCase();
  if(q)list=list.filter(t=>((t.title||'')+' '+(t.detail||'')).toLowerCase().includes(q));
  return list.slice().sort((a,b)=>(a.done-b.done)||(b.ts-a.ts));
}

/* ============================ handlers ============================ */
function selectProject(id){lockerRevokeMedia();view.lkExpanded={};view.projectId=id;view.tags=[];view.search='';view.drawer=false;view.expanded={};view.titleEdit=null;view.section='tasks';render();}
function selectTag(id){if(id==='ALL'){view.tags=[];}else{const i=view.tags.indexOf(id);if(i>=0)view.tags.splice(i,1);else view.tags.push(id);}render();}
function toggleTags(){view.tagsOpen=!view.tagsOpen;render();}
function toggleEditorTags(id){view.editorTagsOpen[id]=!view.editorTagsOpen[id];render();}
function toggleDone(id){const t=store.tasks.find(x=>x.id===id);if(t){t.done=!t.done;save();render();}}
function toggleExpand(id){if(view.expanded[id])delete view.expanded[id];else view.expanded[id]=true;view.titleEdit=null;render();}
function deleteTask(id){store.tasks=store.tasks.filter(t=>t.id!==id);save();render();}
function setTitle(id,val){const t=store.tasks.find(x=>x.id===id);if(t){t.title=val;store.updatedAt=Date.now();persistLocal();schedulePush();}}
function setDetail(id,val){const t=store.tasks.find(x=>x.id===id);if(t){t.detail=val;store.updatedAt=Date.now();persistLocal();schedulePush();}}
function toggleSub(id,i){const t=store.tasks.find(x=>x.id===id);if(t&&t.subs[i]){t.subs[i].done=!t.subs[i].done;save();render();}}
function addSub(id,txt){txt=(txt||'').trim();if(!txt)return;const t=store.tasks.find(x=>x.id===id);if(t){t.subs.push({text:txt,done:false});subDraft[id]='';_focusSub=id;save();render();}}
function toggleTaskTag(id,tagId){const t=store.tasks.find(x=>x.id===id);if(t){const oldFirst=t.tagIds[0];t.tagIds=t.tagIds.includes(tagId)?t.tagIds.filter(x=>x!==tagId):[...t.tagIds,tagId];const nf=t.tagIds[0];if(nf&&nf!==oldFirst){const tg=store.tags.find(x=>x.id===nf);if(tg)t.icon=tg.icon;}save();render();}}
function addTask(){
  const ta=document.getElementById('otk-composer');if(!ta)return;const raw=ta.value||'';const lines=raw.split('\n');const title=lines[0].trim();if(!title)return;
  const detail=lines.slice(1).join('\n').trim();const tagIds=[...view.tags];const ts=Date.now();
  const ftg=tagIds.length?store.tags.find(x=>x.id===tagIds[0]):null;
  store.tasks.unshift({id:'t'+uid(),projectId:view.projectId,icon:ftg?ftg.icon:view.composerIcon,title,detail,tagIds,done:false,ts,date:fmtDate(ts),subs:[]});
  save();render();const nt=document.getElementById('otk-composer');if(nt)nt.focus();
}
function openPicker(kind,id){picker={open:true,target:{kind,id:id||null}};render();}
function closePicker(){picker.open=false;render();}
function pickIcon(key){const tg=picker.target;picker={open:false,target:null};
  if(tg){if(tg.kind==='task'){const t=store.tasks.find(x=>x.id===tg.id);if(t)t.icon=key;save();}else if(tg.kind==='composer'){view.composerIcon=key;}else if(tg.kind==='project'){const p=store.projects.find(x=>x.id===tg.id);if(p)p.icon=key;save();}else if(tg.kind==='tag'){const t=store.tags.find(x=>x.id===tg.id);if(t){t.icon=key;store.tasks.forEach(tk=>{if(tk.tagIds[0]===tg.id)tk.icon=key;});}save();}}
  render();}
function currentTargetIcon(){const tg=picker.target;if(!tg)return null;if(tg.kind==='task'){const t=store.tasks.find(x=>x.id===tg.id);return t&&t.icon;}if(tg.kind==='composer')return view.composerIcon;if(tg.kind==='project'){const p=store.projects.find(x=>x.id===tg.id);return p&&p.icon;}if(tg.kind==='tag'){const t=store.tags.find(x=>x.id===tg.id);return t&&t.icon;}return null;}
function targetLabel(){const tg=picker.target;if(!tg)return '';if(tg.kind==='composer')return 'New task';if(tg.kind==='task'){const t=store.tasks.find(x=>x.id===tg.id);return 'Task · '+(t?t.title:'');}if(tg.kind==='project'){const p=store.projects.find(x=>x.id===tg.id);return 'Project · '+(p?p.name:'');}if(tg.kind==='tag'){const t=store.tags.find(x=>x.id===tg.id);return 'Tag · '+(t?t.label:'');}return '';}
function openPrompt(kind){promptS={open:true,kind,value:''};render();}
function closePrompt(){promptS.open=false;render();}
function promptOk(){const inp=document.getElementById('otk-prompt');const name=((inp?inp.value:promptS.value)||'').trim();
  if(promptS.kind==='project'){const id='p'+uid();const code='P'+String(store.projects.length+1).padStart(2,'0');store.projects.push({id,code,name:name||'Untitled',icon:PROJ_ICON_CYCLE[store.projects.length%PROJ_ICON_CYCLE.length],tagIds:[]});view.projectId=id;view.tags=[];view.search='';view.expanded={};}
  else if(promptS.kind==='tag'){if(name){const id='tag'+uid();store.tags.push({id,label:name,icon:'sine'});const p=currentProject();if(p&&!p.tagIds.includes(id))p.tagIds.push(id);}}
  promptS.open=false;save();render();}
function deleteProject(id){const p=store.projects.find(x=>x.id===id);if(!p)return;if(!confirm('Delete project "'+p.name+'" and all its tasks?'))return;store.projects=store.projects.filter(x=>x.id!==id);store.tasks=store.tasks.filter(t=>t.projectId!==id);if(view.projectId===id){view.projectId=store.projects[0]?store.projects[0].id:null;view.tags=[];}save();render();}
function toggleSearchM(){view.searchOpen=!view.searchOpen;if(!view.searchOpen)view.search='';render();}
function setSetting(key,val){if(key==='glyphes')val=parseFloat(val);settings[key]=val;saveSettings();render();}

let _sw=null,_suppressClick=false,_focusSub=null;
function swMove(e){if(!_sw)return;let dx=e.clientX-_sw.x0;dx=Math.max(-140,Math.min(140,dx));_sw.dx=dx;if(Math.abs(dx)>8)_sw.dragged=true;_sw.el.style.transition='none';_sw.el.style.transform='translateX('+dx+'px)';}
function swEnd(){if(!_sw)return;const sw=_sw;_sw=null;window.removeEventListener('pointermove',swMove);window.removeEventListener('pointerup',swEnd);window.removeEventListener('pointercancel',swEnd);const el=sw.el,dx=sw.dx;el.style.transition='transform .22s ease';el.style.transform='translateX(0px)';if(sw.dragged){_suppressClick=true;setTimeout(()=>{_suppressClick=false;},350);if(dx>80)toggleDone(sw.id);else if(dx<-80)deleteTask(sw.id);}}
function swStart(id,el,e){_sw={id,x0:e.clientX,el,dx:0,dragged:false};window.addEventListener('pointermove',swMove);window.addEventListener('pointerup',swEnd);window.addEventListener('pointercancel',swEnd);}

/* ============================ per-task view-model ============================ */
function buildTask(t,proj,tById){
  const g=G(),done=t.done,exp=!!view.expanded[t.id];
  const mini=Math.round(13*g),rowI=Math.round(18*g),bigI=Math.round(30*g),railW=Math.round(46*Math.min(g,1.3));
  const subsDone=t.subs.filter(x=>x.done).length;
  const tagsMini=t.tagIds.map(id=>tById[id]).filter(Boolean).map(tg=>'<span style="display:flex">'+icon(tg.icon,mini)+'</span>').join('');
  const titleStyle='flex:1;min-width:0;font-size:13px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:var(--tt);letter-spacing:var(--ttls);'+(done?'color:var(--faint);text-decoration:line-through;':'color:var(--text);');
  const titleWrap='flex:1;min-width:0;font-size:13px;line-height:1.35;white-space:normal;word-break:break-word;overflow-wrap:anywhere;text-transform:var(--tt);letter-spacing:var(--ttls);'+(done?'color:var(--faint);text-decoration:line-through;':'color:var(--text);');
  const cardTitleStyle='flex:1;min-width:0;font-size:12.5px;font-weight:500;line-height:1.35;text-transform:var(--tt);letter-spacing:var(--ttls);'+(done?'color:var(--faint);text-decoration:line-through;':'color:var(--text);');
  const rowIconStyle='display:flex;flex:none;color:'+(done?'var(--faint)':'var(--accent)')+';';
  const checkBase='display:flex;align-items:center;justify-content:center;width:17px;height:17px;flex:none;border-radius:var(--r3);padding:0;cursor:pointer;';
  const checkStyle=checkBase+(done?'background:var(--accent2);border:1.5px solid var(--accent2);color:var(--bg);':'background:transparent;border:1.5px solid var(--line-strong);color:transparent;');
  const checkEl=done?icon('check',12):'';
  return {t,g,done,exp,mini,rowI,bigI,railW,subsDone,tagsMini,titleStyle,titleWrap,cardTitleStyle,rowIconStyle,checkStyle,checkEl,
    iconEl:icon(t.icon,rowI),iconElBig:icon(t.icon,bigI),
    railStyle:'display:flex;align-items:center;justify-content:center;width:'+railW+'px;flex:none;border-right:1px solid var(--line);background:'+(done?'var(--bg2)':'var(--accent-dim)')+';color:'+(done?'var(--faint)':'var(--accent)')+';',
    cardStyle:'border:1px solid var(--line);border-radius:var(--r1);overflow:hidden;background:var(--surface2);'+(done?'opacity:.78;':''),
    chevronStyle:'display:flex;flex:none;color:var(--faint);transition:transform .18s ease;transform:rotate('+(exp?'180deg':'0deg')+');'};
}
function titleEditHTML(t,fs){
  const editing=view.titleEdit===t.id;const sz=fs||13;
  const base='flex:1;min-width:0;font-family:inherit;font-size:'+sz+'px;font-weight:600;color:var(--text);line-height:1.35;text-transform:var(--tt);letter-spacing:var(--ttls);';
  const btn='<button data-act="editTitle" data-id="'+t.id+'" title="'+(editing?'Done':'Edit name')+'" style="display:flex;flex:none;align-items:center;padding:3px;border:none;background:transparent;color:'+(editing?'var(--accent)':'var(--dim2)')+';cursor:pointer;">'+icon(editing?'check':'pencil',15)+'</button>';
  if(editing)return '<textarea class="otk-title" data-act="stop" data-id="'+t.id+'" rows="1" placeholder="Title…" style="'+base+'background:transparent;border:none;border-bottom:1px solid var(--accent-line);outline:none;resize:none;overflow:hidden;padding:0 0 2px;">'+esc(t.title)+'</textarea>'+btn;
  return '<span style="'+base+'white-space:normal;word-break:break-word;overflow-wrap:anywhere;">'+esc(t.title)+'</span>'+btn;
}
function lpIconHTML(bt,big){const t=bt.t;return '<span data-act="pickerFor" data-kind="task" data-id="'+t.id+'" title="Change icon" style="'+(big?bt.railStyle:bt.rowIconStyle)+'cursor:pointer;">'+(big?bt.iconElBig:bt.iconEl)+'</span>';}
function taskEditorHTML(bt,proj,tById){
  const t=bt.t,g=bt.g,mini=Math.round(13*g);
  const allTags=(proj.tagIds||[]).map(id=>tById[id]).filter(Boolean).map(tg=>{const active=t.tagIds.includes(tg.id);const cs='display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:var(--r3);font-family:inherit;font-size:10px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;border:1px solid '+(active?'var(--accent-line)':'var(--line)')+';background:'+(active?'var(--accent-soft)':'var(--surface2)')+';color:'+(active?'var(--accent)':'var(--dim2)')+';';return '<button data-act="toggleTaskTag" data-id="'+t.id+'" data-tid="'+tg.id+'" style="'+cs+'"><span style="display:flex">'+icon(tg.icon,mini)+'</span>'+esc(tg.label)+'</button>';}).join('');
  const teAssigned=t.tagIds.map(id=>tById[id]).filter(Boolean);const teOpen=!!view.editorTagsOpen[t.id];
  const subs=t.subs.map((s,i)=>{const ck=s.done?'background:var(--accent2);border:1.5px solid var(--accent2);color:var(--bg);':'background:transparent;border:1.5px solid var(--line-strong);color:transparent;';const tx='font-size:12px;line-height:1.4;'+(s.done?'color:var(--faint);text-decoration:line-through;':'color:var(--text2);');return '<div data-act="toggleSub" data-id="'+t.id+'" data-i="'+i+'" style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:2px 0;"><span style="display:flex;align-items:center;justify-content:center;width:15px;height:15px;flex:none;border-radius:var(--r3);'+ck+'">'+(s.done?icon('check',10):'')+'</span><span style="'+tx+'">'+esc(s.text)+'</span></div>';}).join('');
  const doneBtn=(t.done?'background:transparent;border:1px solid var(--line-strong);color:var(--dim);':'background:var(--accent2-soft);border:1px solid var(--accent2-line);color:var(--accent2);')+'display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:var(--r2);cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:.04em;text-transform:uppercase;';
  return '<div style="border-top:1px solid var(--line);background:var(--surface2);padding:11px 13px 13px;display:flex;flex-direction:column;gap:11px;">'
    +'<textarea class="otk-detail" data-id="'+t.id+'" placeholder="Details…" spellcheck="false" style="width:100%;min-height:22px;resize:none;overflow:hidden;background:var(--bg);border:1px solid var(--line);border-radius:var(--r2);padding:8px 10px;font-family:inherit;font-size:12.5px;line-height:1.55;color:var(--text2);outline:none;">'+esc(t.detail)+'</textarea>'
    +(t.subs.length?'<div style="display:flex;flex-direction:column;gap:3px;">'+subs+'</div>':'')
    +'<input class="otk-subdraft" data-id="'+t.id+'" value="'+esc(subDraft[t.id]||'')+'" placeholder="+ subtask" style="width:100%;background:transparent;border:1px dashed var(--line-strong);border-radius:var(--r3);padding:5px 9px;font-family:inherit;font-size:11.5px;color:var(--dim);outline:none;" />'
    +'<div style="display:flex;flex-direction:column;gap:7px;"><button data-act="toggleEditorTags" data-id="'+t.id+'" style="display:flex;align-items:center;gap:8px;padding:5px 9px;border:1px solid var(--line);border-radius:var(--r3);background:var(--bg);font-family:inherit;font-size:10px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;align-self:flex-start;"><span style="color:var(--faint);">Tags</span>'+(teAssigned.length?'<span style="display:flex;gap:4px;color:var(--accent);">'+teAssigned.map(tg=>icon(tg.icon,mini)).join('')+'</span>':'<span style="color:var(--faint);">—</span>')+'<span style="display:flex;color:var(--faint);transition:transform .18s;transform:rotate('+(teOpen?'180deg':'0deg')+');">'+icon('chevron',13)+'</span></button>'+(teOpen?'<div style="display:flex;flex-wrap:wrap;gap:5px;">'+allTags+'</div>':'')+'</div>'
    +'<div style="display:flex;gap:8px;padding-top:2px;"><button data-act="toggleDone" data-id="'+t.id+'" style="'+doneBtn+'">'+(t.done?'Reopen':'Done')+'</button><span style="flex:1"></span><button data-act="deleteTask" data-id="'+t.id+'" title="Delete" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #5a3230;border-radius:var(--r2);background:rgba(224,90,70,.10);color:#e0705a;font-family:inherit;font-size:11px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;">Delete</button></div>'
  +'</div>';
}

/* ============================ tag chips ============================ */
function chip(active){return 'display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:var(--r3);font-family:inherit;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;border:1px solid '+(active?'var(--accent-line)':'var(--line)')+';background:'+(active?'var(--accent-soft)':'var(--bg2)')+';color:'+(active?'var(--accent)':'var(--dim2)')+';';}
function tagBarHTML(proj,projTasks,nowrap){
  const g=G(),tById=tagMap();const pOpen=projTasks.filter(t=>!t.done).length;const nw=nowrap?'white-space:nowrap;flex:none;':'';
  let h='<button data-act="selectTag" data-id="ALL" style="'+chip(!view.tags.length)+nw+'">All<span style="opacity:.6;font-size:9.5px;">'+pOpen+'</span></button>';
  (proj.tagIds||[]).forEach(tid=>{const tg=tById[tid];if(!tg)return;const active=view.tags.includes(tid);const cnt=projTasks.filter(t=>!t.done&&t.tagIds.includes(tid)).length;h+='<button data-act="selectTag" data-id="'+tid+'" style="'+chip(active)+nw+'"><span data-act="pickerFor" data-kind="tag" data-id="'+tid+'" title="Change icon" style="display:flex;cursor:pointer;">'+icon(tg.icon,Math.round(13*g))+'</span>'+esc(tg.label)+'<span style="font-size:9.5px;margin-left:1px;color:'+(active?'var(--accent)':'var(--faint)')+';">'+cnt+'</span></button>';});
  h+='<button data-act="addTag" title="New tag" style="display:flex;align-items:center;gap:5px;padding:4px 9px;'+nw+'border:1px dashed var(--line-strong);border-radius:var(--r3);background:transparent;color:var(--faint);font-family:inherit;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;">+ Tag</button>';

function filterButtonHTML(proj){
  const g=G(),tById=tagMap();const n=view.tags.length,on=n>0;let label,ic;
  if(n===0){label='All';ic=icon('sliders',Math.round(13*g));}
  else if(n===1){const tg=tById[view.tags[0]];label=tg?esc(tg.label):'1 tag';ic=tg?icon(tg.icon,Math.round(13*g)):icon('sliders',Math.round(13*g));}
  else{label=n+' tags';ic=icon('sliders',Math.round(13*g));}
  return '<button data-act="toggleTags" title="Filter" style="display:flex;align-items:center;gap:6px;padding:5px 10px;flex:none;border:1px solid '+(on?'var(--accent-line)':'var(--line)')+';border-radius:var(--r3);background:'+(on?'var(--accent-soft)':'var(--bg2)')+';color:'+(on?'var(--accent)':'var(--dim)')+';font-family:inherit;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;"><span style="display:flex;">'+ic+'</span>'+label+'<span style="display:flex;color:var(--faint);transition:transform .18s;transform:rotate('+(view.tagsOpen?'180deg':'0deg')+');">'+icon('chevron',13)+'</span></button>';

/* ============================ desktop ============================ */
function listInnerHTML(){
  const proj=currentProject();if(!proj)return '';const tById=tagMap();const tasks=filteredTasks(proj);const asCards=settings.disposition==='Cards';
  if(!tasks.length)return '<div style="padding:44px 20px;text-align:center;color:var(--faint);font-size:12px;line-height:1.6;">No tasks yet.</div>';
  if(!asCards){
    let rows='';
    tasks.forEach(t=>{const bt=buildTask(t,proj,tById);rows+='<div style="border-bottom:1px solid var(--line-soft);">'
      +'<div data-act="toggleExpand" data-id="'+t.id+'" style="display:flex;align-items:center;gap:11px;padding:8px 12px;cursor:pointer;">'
        +'<button data-act="toggleDone" data-id="'+t.id+'" title="Complete" style="'+bt.checkStyle+'">'+bt.checkEl+'</button>'
        +(bt.exp?(lpIconHTML(bt,false)+titleEditHTML(t)):('<span style="'+bt.rowIconStyle+'">'+bt.iconEl+'</span><span style="'+bt.titleStyle+'">'+esc(t.title)+'</span><span style="display:flex;gap:5px;flex:none;color:var(--faint);">'+bt.tagsMini+'</span>'+(t.subs.length?'<span style="font-size:10px;color:var(--faint);letter-spacing:.05em;flex:none;">'+bt.subsDone+'/'+t.subs.length+'</span>':'')+'<span style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);min-width:52px;text-align:right;flex:none;">'+esc(t.date)+'</span>'))
        +'<span style="'+bt.chevronStyle+'">'+icon('chevron',15)+'</span></div>'
      +(bt.exp?taskEditorHTML(bt,proj,tById):'')+'</div>';});
    return '<div style="border:1px solid var(--line);border-radius:var(--r1);overflow:hidden;background:var(--bg2);">'+rows+'</div>';
  }else{
    let cards='';
    tasks.forEach(t=>{const bt=buildTask(t,proj,tById);cards+='<div style="'+bt.cardStyle+'">'
      +'<div data-act="toggleExpand" data-id="'+t.id+'" style="display:flex;cursor:pointer;">'
        +(bt.exp?lpIconHTML(bt,true):('<div style="'+bt.railStyle+'">'+bt.iconElBig+'</div>'))
        +'<div style="flex:1;min-width:0;padding:9px 11px;">'+(bt.exp?('<div style="display:flex;align-items:center;gap:6px;">'+titleEditHTML(t)+'<button data-act="toggleDone" data-id="'+t.id+'" title="Complete" style="'+bt.checkStyle+'">'+bt.checkEl+'</button></div>'):('<div style="display:flex;align-items:flex-start;gap:8px;"><span style="'+bt.cardTitleStyle+'">'+esc(t.title)+'</span><button data-act="toggleDone" data-id="'+t.id+'" title="Complete" style="'+bt.checkStyle+'">'+bt.checkEl+'</button></div>'+(t.detail&&t.detail.trim()?'<div style="margin-top:5px;font-size:11.5px;line-height:1.45;color:var(--dim2);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">'+esc(t.detail)+'</div>':'')+'<div style="display:flex;align-items:center;gap:8px;margin-top:9px;"><span style="display:flex;gap:5px;color:var(--dim2);">'+bt.tagsMini+'</span><span style="flex:1"></span>'+(t.subs.length?'<span style="font-size:10px;color:var(--faint);">'+bt.subsDone+'/'+t.subs.length+'</span>':'')+'<span style="font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);">'+esc(t.date)+'</span></div>'))+'</div></div>'
      +(bt.exp?taskEditorHTML(bt,proj,tById):'')+'</div>';});
    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start;">'+cards+'</div>';
  }
}
function renderDesktop(){
  const g=G();const proj=currentProject();
  const gProj=store.projects.length,gTasks=store.tasks.length,gOpen=store.tasks.filter(t=>!t.done).length;
  const searchCentered=settings.recherche==='Centered';
  const searchBase='display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--line);border-radius:var(--r2);background:var(--bg2);';

  if(syncOpen){const connected=cloudOn();h+='<div data-act="closeSync" style="position:fixed;inset:0;z-index:60;background:rgba(6,5,4,.74);display:flex;align-items:center;justify-content:center;padding:24px;"><div data-act="stop" style="width:450px;max-width:100%;background:var(--surface2);border:1px solid var(--line-strong);border-radius:var(--r1);padding:18px;box-shadow:0 28px 80px rgba(0,0,0,.6);"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><span style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);">Sync — GitHub Gist</span><button data-act="closeSync" title="Close" style="display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:none;border-radius:var(--r3);background:transparent;color:var(--dim2);cursor:pointer;">'+icon('x',16)+'</button></div>'
    +'<p style="margin:0 0 14px;font-size:11px;line-height:1.6;color:var(--dim2);">Classic token, <span style="color:var(--dim);">gist</span> scope. Stored on this device only. Empty Gist ID = create.</p>'
    +'<label style="display:block;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;">Token</label><input id="otk-token" type="password" value="'+esc(cloud.token)+'" placeholder="ghp_…" style="width:100%;margin-bottom:12px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r2);padding:9px 11px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;" />'
    +'<label style="display:block;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;">Gist ID (empty = create)</label><input id="otk-gist" value="'+esc(cloud.id)+'" placeholder="—" style="width:100%;margin-bottom:12px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r2);padding:9px 11px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;" />'
    +'<label style="display:block;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;">Passphrase (vault — empty = unencrypted)</label><input id="otk-pass" type="password" value="'+esc(encPass())+'" placeholder="end-to-end encryption" style="width:100%;margin-bottom:6px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r2);padding:9px 11px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;" />'
    +'<p style="margin:0 0 13px;font-size:10px;line-height:1.6;color:var(--faint);">If set, your notes are encrypted (AES-256) before upload. Same passphrase on every device. Lost = unrecoverable.</p>'
    +'<div style="border-top:1px solid var(--line-soft);margin:2px 0 13px;padding-top:13px;"><label style="display:block;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;">Locker — Worker URL (media, optional)</label><input id="otk-lkurl" value="'+esc(locker.url)+'" placeholder="https://….workers.dev" style="width:100%;margin-bottom:10px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r2);padding:9px 11px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;" /><label style="display:block;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;">Locker token</label><input id="otk-lktoken" type="password" value="'+esc(locker.token)+'" placeholder="LOCKER_TOKEN" style="width:100%;background:var(--bg);border:1px solid var(--line);border-radius:var(--r2);padding:9px 11px;font-family:inherit;font-size:12.5px;color:var(--text);outline:none;" /></div>'
    +'<div id="otk-syncstatus" style="font-size:10.5px;letter-spacing:.04em;color:var(--dim2);margin-bottom:12px;min-height:14px;">'+(cloud.err?esc(cloud.err):(connected?'Connected · Gist '+esc(cloud.id.slice(0,10))+(encOn()?' · encrypted':''):'Not connected'))+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px;"><span style="flex:1"></span>'+(connected?'<button data-act="syncDisconnect" style="padding:8px 13px;border:1px solid var(--line-strong);border-radius:var(--r2);background:transparent;color:var(--dim);font-family:inherit;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;">Disconnect</button>':'')+'<button data-act="syncConnect" style="padding:8px 16px;border:none;border-radius:var(--r2);background:var(--accent);color:var(--bg);font-family:inherit;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;">'+(connected?'Reconnect':'Connect')+'</button></div></div></div>';}
  if(settingsOpen)h+=settingsHTML();
  h+=lockerViewerHTML();
  return h;
}
function segRow(label,key,opts){let b='';opts.forEach(o=>{const active=settings[key]===o;b+='<button data-act="setSetting" data-key="'+key+'" data-val="'+esc(o)+'" style="padding:6px 11px;border-radius:var(--r3);border:1px solid '+(active?'var(--accent-line)':'var(--line)')+';background:'+(active?'var(--accent-soft)':'var(--bg)')+';color:'+(active?'var(--accent)':'var(--dim)')+';font-family:inherit;font-size:11px;cursor:pointer;">'+esc(o)+'</button>';});return '<div style="margin-bottom:14px;"><div style="font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:7px;">'+label+'</div><div style="display:flex;flex-wrap:wrap;gap:6px;">'+b+'</div></div>';}
function swatchRow(label,key,map,mode){let b='';Object.keys(map).forEach(name=>{const active=settings[key]===name;const col=mode==='accent'?map[name].a:map[name].bg;b+='<button data-act="setSetting" data-key="'+key+'" data-val="'+esc(name)+'" title="'+esc(name)+'" style="display:flex;align-items:center;gap:7px;padding:5px 9px 5px 6px;border-radius:var(--r3);border:1px solid '+(active?'var(--accent-line)':'var(--line)')+';background:'+(active?'var(--accent-soft)':'var(--bg)')+';color:'+(active?'var(--accent)':'var(--dim)')+';font-family:inherit;font-size:10.5px;cursor:pointer;"><span style="width:14px;height:14px;border-radius:4px;flex:none;background:'+col+';border:1px solid rgba(255,255,255,.12);"></span>'+esc(name)+'</button>';});return '<div style="margin-bottom:14px;"><div style="font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:7px;">'+label+'</div><div style="display:flex;flex-wrap:wrap;gap:6px;">'+b+'</div></div>';}
function settingsHTML(){
  return '<div data-act="closeSettings" style="position:fixed;inset:0;z-index:60;background:rgba(6,5,4,.74);display:flex;align-items:center;justify-content:center;padding:24px;"><div data-act="stop" style="width:520px;max-width:100%;max-height:88vh;overflow-y:auto;background:var(--surface2);border:1px solid var(--line-strong);border-radius:var(--r1);padding:18px;box-shadow:0 28px 80px rgba(0,0,0,.6);">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;"><span style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);">Settings</span><button data-act="closeSettings" title="Close" style="display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:none;border-radius:var(--r3);background:transparent;color:var(--dim2);cursor:pointer;">'+icon('x',16)+'</button></div>'
    +swatchRow('Background','fond',BASES,'bg')+swatchRow('Accent','accent',ACCENTS,'accent')
    +segRow('Font','police',Object.keys(FONTS))+segRow('Corners','coins',['Rounded','Square'])+segRow('Titles','titres',['Normal','Uppercase'])+segRow('Search (desktop)','recherche',['Right','Centered'])+segRow('Layout (desktop)','disposition',['Rows','Cards'])
    +'<div style="margin-bottom:4px;"><div style="font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:7px;">Glyph size · <span id="otk-glyphval" style="color:var(--dim)">'+G().toFixed(2)+'×</span></div><input id="otk-glyph" type="range" min="1" max="1.6" step="0.05" value="'+G()+'" style="width:100%;accent-color:var(--accent);" /></div></div></div>';
}

/* ============================ render + wiring ============================ */
const MOBILE_Q=window.matchMedia('(max-width:640px)');
function isMobile(){return MOBILE_Q.matches;}
function render(){applyTheme();document.getElementById('app').innerHTML=(isMobile()?renderMobile():renderDesktop())+modalsHTML();attachInputs(document);refreshSyncDot();}
function refreshList(){const el=document.getElementById('otk-list');if(!el)return;el.innerHTML=isMobile()?tileListHTML():listInnerHTML();attachInputs(el);}
function attachInputs(scope){
  scope.querySelectorAll('.otk-title').forEach(el=>{const gr=()=>{el.style.height='auto';el.style.height=el.scrollHeight+'px';};el.addEventListener('input',()=>{setTitle(el.dataset.id,el.value);gr();});el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key==='Escape'){e.preventDefault();view.titleEdit=null;render();}});el.addEventListener('blur',()=>{const id=el.dataset.id;setTimeout(()=>{if(view.titleEdit===id){view.titleEdit=null;render();}},0);});gr();});
  scope.querySelectorAll('.otk-detail').forEach(el=>{const gr=()=>{el.style.height='auto';el.style.height=el.scrollHeight+'px';};el.addEventListener('input',()=>{setDetail(el.dataset.id,el.value);gr();});gr();});
  scope.querySelectorAll('.otk-subdraft').forEach(el=>{el.addEventListener('input',()=>{subDraft[el.dataset.id]=el.value;});el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addSub(el.dataset.id,el.value);}});});
  scope.querySelectorAll('.otk-tile').forEach(el=>{el.addEventListener('pointerdown',e=>{if(e.target.closest('.otk-nosw'))return;swStart(el.dataset.id,el,e);});});
  if(scope===document){
    const c=document.getElementById('otk-composer');if(c){c.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTask();}});c.addEventListener('input',()=>{c.style.height='auto';c.style.height=Math.min(c.scrollHeight,120)+'px';});if(!isMobile()&&!picker.open&&!promptS.open&&!syncOpen&&!settingsOpen)c.focus();}
    const s=document.getElementById('otk-search');if(s){s.addEventListener('input',()=>{view.search=s.value;refreshList();});if(view.searchOpen&&isMobile())s.focus();}
    const p=document.getElementById('otk-prompt');if(p){p.addEventListener('input',()=>{promptS.value=p.value;});p.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();promptOk();}if(e.key==='Escape')closePrompt();});setTimeout(()=>p.focus(),20);}
    const gl=document.getElementById('otk-glyph');if(gl){gl.addEventListener('input',()=>{const v=document.getElementById('otk-glyphval');if(v)v.textContent=parseFloat(gl.value).toFixed(2)+'×';});gl.addEventListener('change',()=>setSetting('glyphes',gl.value));}
    if(_focusSub){const si=document.querySelector('.otk-subdraft[data-id="'+_focusSub+'"]');_focusSub=null;if(si)si.focus();}
    if(view.titleEdit){const tt=document.querySelector('.otk-title[data-id="'+view.titleEdit+'"]');if(tt){tt.focus();const L=tt.value.length;try{tt.setSelectionRange(L,L);}catch(e){}}}
    const fi=document.getElementById('otk-file');if(fi)fi.addEventListener('change',()=>{lockerUpload(fi.files);fi.value='';});
    const dz=document.getElementById('otk-dz');if(dz){dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='var(--accent)';});dz.addEventListener('dragleave',()=>{dz.style.borderColor='';});dz.addEventListener('drop',e=>{e.preventDefault();dz.style.borderColor='';if(e.dataTransfer&&e.dataTransfer.files)lockerUpload(e.dataTransfer.files);});}
    const lks=document.getElementById('otk-lksearch');if(lks)lks.addEventListener('input',()=>{view.lkSearch=lks.value;refreshLkList();});
    wireLkAudio(document);
  }
}
document.getElementById('app').addEventListener('click',e=>{
  const el=e.target.closest('[data-act]');if(!el)return;if(_suppressClick){_suppressClick=false;if(el.dataset.act==='toggleExpand')return;}const d=el.dataset,act=d.act;
  switch(act){
    case 'stop':return;
    case 'selectProject':selectProject(d.id);break;
    case 'selectTag':selectTag(d.id);break;
    case 'toggleTags':toggleTags();break;
    case 'toggleEditorTags':toggleEditorTags(d.id);break;
    case 'editTitle':view.titleEdit=(view.titleEdit===d.id?null:d.id);render();break;
    case 'toggleDone':toggleDone(d.id);break;
    case 'toggleExpand':toggleExpand(d.id);break;
    case 'deleteTask':deleteTask(d.id);break;
    case 'toggleSub':toggleSub(d.id,+d.i);break;
    case 'toggleTaskTag':toggleTaskTag(d.id,d.tid);break;
    case 'pickerFor':openPicker(d.kind,d.id);break;
    case 'pickIcon':pickIcon(d.key);break;
    case 'closePicker':closePicker();break;
    case 'addTask':addTask();break;
    case 'addProject':openPrompt('project');break;
    case 'addTag':openPrompt('tag');break;
    case 'promptOk':promptOk();break;
    case 'promptCancel':closePrompt();break;
    case 'openSync':openSync();break;
    case 'closeSync':closeSync();break;
    case 'syncConnect':syncConnect();break;
    case 'syncDisconnect':syncDisconnect();break;
    case 'openDrawer':view.drawer=true;render();break;
    case 'closeDrawer':view.drawer=false;render();break;
    case 'toggleSearch':toggleSearchM();break;
    case 'openSettings':settingsOpen=true;render();break;
    case 'closeSettings':settingsOpen=false;render();break;
    case 'setSetting':setSetting(d.key,d.val);break;
    case 'toggleDeskNav':view.deskNav=!view.deskNav;render();break;
    case 'setSection':setSection(d.s);break;
    case 'lkPick':{const fi=document.getElementById('otk-file');if(fi)fi.click();break;}
    case 'lkExpand':{const id=d.id;if(view.lkExpanded[id])delete view.lkExpanded[id];else{view.lkExpanded[id]=true;lockerEnsureMedia(id);}render();break;}
    case 'lkDownload':lockerDownload(d.id);break;
    case 'lkDelete':lockerDelete(d.id);break;
    case 'lkToggleTag':lockerToggleTag(d.id,d.tid);break;
    case 'lkAttachOpen':view.lkAttachOpen=(view.lkAttachOpen===d.id?null:d.id);render();break;
    case 'lkAttach':lockerAttach(d.id,d.tid);break;
    case 'lkUnlink':lockerUnlink(d.id);break;
    case 'lkFilterToggle':view.lkFilterOpen=!view.lkFilterOpen;render();break;
    case 'lkFilterClose':view.lkFilterOpen=false;render();break;
    case 'lkSetFilter':view.lkFilter=d.f;view.lkFilterOpen=false;render();break;
    case 'lkSetSort':view.lkSort=d.s;view.lkFilterOpen=false;render();break;
    case 'lkEnlarge':view.lkLightbox=d.id;lockerEnsureMedia(d.id);render();break;
    case 'lkLightboxClose':view.lkLightbox=null;render();break;
    case 'lkPlay':{const a=document.getElementById('otk-audio-'+d.id);if(a){if(a.paused){document.querySelectorAll('audio[data-lk]').forEach(o=>{if(o!==a)o.pause();});a.play().catch(()=>{});}else a.pause();}break;}
    case 'lkSeek':{const a=document.getElementById('otk-audio-'+d.id);if(a){const r=el.getBoundingClientRect();const frac=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));const dur=a.duration||(lkMedia[d.id]&&lkMedia[d.id].duration)||0;if(dur){a.currentTime=frac*dur;const c=document.getElementById('otk-wave-'+d.id);if(c)lkDrawWave(c,d.id);}}break;}
  }
});
document.getElementById('app').addEventListener('contextmenu',e=>{const el=e.target.closest('[data-act=selectProject]');if(el){e.preventDefault();deleteProject(el.dataset.id);}});

/* ============================ startup ============================ */
render();
if(cloudOn())cloudPull();
if(cloudOn()&&encOn())lockerPull().then(()=>{if(view.section==='locker')render();});
let _wasMobile=isMobile();
MOBILE_Q.addEventListener('change',()=>{_wasMobile=isMobile();render();});
window.addEventListener('resize',()=>{if(isMobile()!==_wasMobile){_wasMobile=isMobile();render();}});
function canAutoPull(){if(!cloudOn()||pushTimer||!navigator.onLine)return false;if(picker.open||promptS.open||syncOpen||settingsOpen)return false;const a=document.activeElement,t=a&&a.tagName;if(t==='TEXTAREA')return false;if(t==='INPUT'&&(a.value||'').trim())return false;return true;}
setInterval(()=>{if(canAutoPull())cloudPull();},45000);
setInterval(()=>{if(view.section==='locker'&&lockerReady()&&!Object.keys(lkUploads).length&&!view.lkLightbox){const b=lockerIndex.map(i=>i.id).join(',');lockerPull().then(()=>{if(lockerIndex.map(i=>i.id).join(',')!==b)render();});}},5000);
window.addEventListener('online',()=>{if(cloudOn())cloudPull();});
})();
</script>
</body>
</html>
